<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Diary </title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<meta name="theme-color" content="#00b4db">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<style>

:root{
--primary:#00b4db;
--secondary:#0083b0;
--dark:#0f172a;
--card:rgba(255,255,255,0.08);
--border:rgba(255,255,255,0.1);
--white:#fff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:var(--dark);
color:white;
overflow-y:auto;
position:relative;
}

body::before{
content:'';
position:fixed;
width:200%;
height:200%;
background:
radial-gradient(circle,#00b4db22 1px,transparent 1px);
background-size:40px 40px;
animation:bgMove 25s linear infinite;
z-index:-1;
}

@keyframes bgMove{
from{
transform:translate(0,0);
}
to{
transform:translate(-200px,-200px);
}
}

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
animation:fadeOut 1s ease 2s forwards;
}

#splash h1{
font-size:70px;
margin-bottom:10px;
}

#splash p{
opacity:0.8;
}

@keyframes fadeOut{
to{
opacity:0;
visibility:hidden;
}
}

#loginPage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.85)),
url('https://images.unsplash.com/photo-1517842645767-c639042777db?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.loginBox{
width:380px;
padding:35px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:30px;
border:1px solid var(--border);
box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.loginBox h1{
text-align:center;
margin-bottom:25px;
font-size:36px;
}

input,
button{
width:100%;
border:none;
outline:none;
}

input{
padding:16px;
margin-top:15px;
border-radius:18px;
background:rgba(255,255,255,0.08);
color:white;
font-size:15px;
}

input::placeholder{
color:#ddd;
}

button{
cursor:pointer;
transition:0.3s;
}

.loginBtn,
.actionBtn{
padding:15px;
margin-top:15px;
border-radius:18px;
background:linear-gradient(135deg,var(--primary),var(--secondary));
color:white;
font-weight:600;
}

.loginBtn:hover,
.actionBtn:hover{
transform:translateY(-3px);
}

.app{
display:flex;
height:100vh;
}

.sidebar{
width:280px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(20px);
padding:25px;
display:flex;
flex-direction:column;
gap:12px;
overflow:auto;
border-right:1px solid var(--border);
}

.logo{
font-size:34px;
font-weight:700;
text-align:center;
margin-bottom:15px;
}

.sidebar button{
padding:15px;
border-radius:16px;
background:rgba(255,255,255,0.08);
color:white;
font-size:15px;
}

.sidebar button:hover{
background:linear-gradient(135deg,var(--primary),var(--secondary));
transform:translateX(5px);
}

.main{
flex:1;
overflow-y:auto;
padding:30px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
padding-bottom:15px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.profile{
display:flex;
align-items:center;
gap:10px;
padding:10px 15px;
background:rgba(255,255,255,0.08);
border-radius:16px;
}

.card{
background:var(--card);
padding:25px;
border-radius:28px;
backdrop-filter:blur(18px);
border:1px solid var(--border);
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.page{
display:none;
animation:fade 0.4s ease;
}

.show{
display:block;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.moods{
display:flex;
flex-wrap:wrap;
gap:10px;
margin:15px 0;
}

.moods button{
padding:10px 18px;
border-radius:50px;
background:rgba(255,255,255,0.1);
color:white;
width:auto;
}

.toolbar{
display:flex;
gap:10px;
margin:15px 0;
flex-wrap:wrap;
}

.toolbar button{

width:55px;
height:55px;
border-radius:14px;
background:rgba(255,255,255,0.12);
color:white;
font-size:18px;
font-weight:600;
border:1px solid rgba(255,255,255,0.1);

}

.toolbar button:hover{

background:linear-gradient(135deg,var(--primary),var(--secondary));
transform:translateY(-3px);

}

#editor{
min-height:320px;
padding:18px;
border-radius:18px;
background:rgba(255,255,255,0.08);
line-height:1.8;
outline:none;
overflow:auto;
}

.counter{
margin-top:10px;
text-align:right;
font-size:13px;
color:#ccc;
}

.msg{
margin-top:12px;
color:#8eff8e;
font-weight:600;
}

.saveBtn{
position:fixed;
bottom:30px;
right:30px;
width:75px;
height:75px;
border-radius:50%;
font-size:28px;
background:linear-gradient(135deg,var(--primary),var(--secondary));
color:white;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
z-index:100;
}

.list{
margin-top:20px;
max-height:500px;
overflow:auto;
}

.item{
background:rgba(255,255,255,0.08);
padding:18px;
border-radius:18px;
margin-bottom:12px;
transition:0.3s;
}

.item:hover{
transform:translateY(-4px);
background:rgba(255,255,255,0.14);
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.stat{
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:22px;
text-align:center;
}

.stat h1{
font-size:40px;
margin-bottom:5px;
}

.profileImageBox{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:20px;
}

#profilePreview{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:5px solid rgba(255,255,255,0.2);
cursor:pointer;
}

.uploadText{
margin-top:10px;
font-size:14px;
color:#ddd;
}

#photoPreview{
width:100%;
margin-top:20px;
border-radius:20px;
display:none;
}

#photoGallery img{
width:90px;
height:90px;
object-fit:cover;
border-radius:14px;
border:2px solid rgba(255,255,255,0.15);
}

.calendar{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:15px;
}

.calendar button{
width:55px;
height:55px;
border-radius:12px;
background:rgba(255,255,255,0.08);
color:white;
}

.calendar button:hover{
background:linear-gradient(135deg,var(--primary),var(--secondary));
}

.lightTheme{
background:#f1f5f9;
color:#111;
}

.lightTheme .card,
.lightTheme .sidebar,
.lightTheme input,
.lightTheme #editor,
.lightTheme .item,
.lightTheme .profile{
background:white;
color:black;
}

.lightTheme .sidebar button,
.lightTheme .toolbar button,
.lightTheme .calendar button{
background:#e2e8f0;
color:black;
}

::-webkit-scrollbar{
width:8px;
height:8px;
}

::-webkit-scrollbar-thumb{
background:rgba(255,255,255,0.2);
border-radius:20px;
}

@media(max-width:900px){

.app{
flex-direction:column;
}

.sidebar{
width:100%;
flex-direction:row;
overflow:auto;
}

.main{
padding:20px;
}

.top{
flex-direction:column;
gap:15px;
align-items:flex-start;
}

}

</style>
</head>

<body>

<div id="splash">
<h1>📔</h1>
<h2>My Diary </h2>
<p>Secure Personal Journal</p>
</div>

<div id="loginPage">

<div class="loginBox">

<h1>📔 My Diary</h1>

<input type="text" id="loginName" placeholder="Enter Your Name">

<input type="password" id="loginPass" placeholder="Password (8+ Characters)">

<button class="loginBtn" onclick="login()">Login</button>

</div>

</div>

<div class="app">

<div class="sidebar">

<div class="logo">📔 Diary</div>

<button onclick="openPage('home')">🏠 Home</button>
<button onclick="openPage('saved')">📚 Diaries</button>
<button onclick="openPage('dashboard')">📊 Dashboard</button>
<button onclick="openPage('favorite')">⭐ Favorites</button>
<button onclick="openPage('trash')">🗑 Trash</button>
<button onclick="openPage('profile')">👤 Profile</button>
<button onclick="openPage('voice')">🎤 Voice</button>
<button onclick="openPage('photo')">🖼 Photos</button>
<button onclick="toggleTheme()">🌙 Theme</button>
<button onclick="toggleMusic()">🎵 Music</button>
<button onclick="exportData()">⬇ Export Backup</button>

<label class="actionBtn" style="text-align:center;cursor:pointer;">
⬆ Import Backup
<input type="file" onchange="importData(event)" hidden>
</label>

<button onclick="logout()">🚪 Logout</button>

</div>
<div class="main">

<div class="top">

<div>
<h1>Welcome 👋</h1>
<p>Your private digital journal</p>
</div>

<div class="profile">

<img id="topProfileImg"
src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
style="width:50px;height:50px;border-radius:50%;object-fit:cover;">

<span id="topUserText">Guest</span>

</div>

</div>

<div id="home" class="page show">

<div class="card">

<input type="date" id="date" onchange="loadDiary()">

<input type="file" id="multiPhotos" accept="image/*" multiple onchange="addPhotos(event)">

<div id="photoGallery" style="display:flex;gap:10px;flex-wrap:wrap;margin-top:15px;"></div>

<div class="moods">

<button onclick="addMood('😊 Happy')">😊 Happy</button>
<button onclick="addMood('😢 Sad')">😢 Sad</button>
<button onclick="addMood('😍 Love')">😍 Love</button>
<button onclick="addMood('😡 Angry')">😡 Angry</button>

</div>

<button class="actionBtn" onclick="suggestDiary()">💡 Suggest Idea</button>

<div id="suggestBox" style="margin-top:12px;"></div>

<div class="toolbar">

<div class="toolbar">

<button onclick="format('bold')"><b>B</b></button>
<button onclick="format('italic')"><i>I</i></button>
<button onclick="format('underline')"><u>U</u></button>
<button onclick="format('strikeThrough')"><s>S</s></button>
<button onclick="format('insertUnorderedList')">•</button>
<button onclick="format('insertOrderedList')">1.</button>
<button onclick="format('justifyLeft')">⬅</button>
<button onclick="format('justifyCenter')">⬍</button>
<button onclick="format('justifyRight')">➡</button>
<button onclick="format('undo')">↩</button>
<button onclick="format('redo')">↪</button>
<button onclick="addLink()">🔗</button>
<button onclick="changeColor()">🎨</button>
<button onclick="decreaseFontSize()">A</button>
<button onclick="increaseFontSize()">A+</button>
<button onclick="clearEditor()">🗑</button>
</div>

</div>

<div id="editor" contenteditable="true"></div>

<div class="counter" id="counter"> 0 Characters</div>

<button class="actionBtn" onclick="addFavorite()">⭐ Add Favorite</button>

<button class="actionBtn" onclick="pinDiary()">📌 Pin Diary</button>

<div class="msg" id="msg"></div>

</div>

<button class="saveBtn" onclick="saveDiary()">💾</button>

</div>

<div id="saved" class="page">

<div class="card">

<h2>📚 Saved Diaries</h2>

<input type="text" placeholder="Search Diaries..." onkeyup="searchDiary(this.value)">

<div class="list" id="diaryList"></div>

</div>

</div>

<div id="dashboard" class="page">

<div class="card">

<h2>📊 Dashboard</h2>

<div class="stats">

<div class="stat">
<h1 id="totalDiary">0</h1>
<p>Total Diaries</p>
</div>

<div class="stat">
<h1 id="favoriteCount">0</h1>
<p>Favorites</p>
</div>

<div class="stat">
<h1 id="wordCount">0</h1>
<p>Total Characters</p>
</div>

</div>

<h2 style="margin-top:30px;">📅 Calendar</h2>

<div id="calendar" class="calendar"></div>

</div>

</div>

<div id="favorite" class="page">

<div class="card">

<h2>⭐ Favorite Diaries</h2>

<div class="list" id="favoriteList"></div>

</div>

</div>

<div id="trash" class="page">

<div class="card">

<h2>🗑 Trash</h2>

<div class="list" id="trashList"></div>

</div>

</div>

<div id="profile" class="page">

<div class="card">

<h2>👤 Edit Profile</h2>

<div class="profileImageBox">

<label for="profilePhotoInput">

<img id="profilePreview"
src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

<div class="uploadText">📷 Change Photo</div>

</label>

<input type="file"
id="profilePhotoInput"
accept="image/*"
onchange="uploadProfilePhoto(event)"
hidden>

</div>

<input type="text" id="editName" placeholder="New Name">

<input type="password" id="editPass" placeholder="New Password">

<button class="loginBtn" onclick="saveProfile()">Save Profile</button>

</div>

</div>

<div id="voice" class="page">

<div class="card">

<h2>🎤 Voice Diary</h2>

<button class="loginBtn" onclick="startVoice()">Start Voice Typing</button>

</div>

</div>

<div id="photo" class="page">

<div class="card">

<h2>🖼 Photo Diary</h2>

<input type="file" accept="image/*" onchange="uploadPhoto(event)">

<img id="photoPreview">

</div>

</div>

</div>

</div>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a0.mp3" type="audio/mp3">
</audio>

<script>

document.addEventListener('keypress',function(e){

if(e.key==='Enter' &&
document.getElementById('loginPage').style.display!=='none'){

login();

}

});
const editor = document.getElementById('editor');

if(localStorage.getItem('user')){

document.getElementById('loginPage').style.display='none';

document.getElementById('topUserText').innerText=
localStorage.getItem('user');

}

document.getElementById('date').value=
new Date().toISOString().split('T')[0];

function login(){

let name=document.getElementById('loginName').value.trim();

let pass=document.getElementById('loginPass').value;

if(name==='' || pass.length<8){

alert('Enter valid details');

return;

}

localStorage.setItem('user',name);

localStorage.setItem('password',btoa(pass));

document.getElementById('loginPage').style.display='none';

document.getElementById('topUserText').innerText=name;

}

function openPage(id){

document.querySelectorAll('.page').forEach(page=>{
page.classList.remove('show');
});

document.getElementById(id).classList.add('show');

if(id==='saved') showList();
if(id==='dashboard') loadDashboard();
if(id==='favorite') loadFavorites();
if(id==='trash') loadTrash();

}

function diaryKey(){

return 'diary_'+localStorage.getItem('user')+'_'+document.getElementById('date').value;

}

function saveDiary(){

let txt=editor.innerHTML.trim();

if(txt==='' || txt==='<br>'){

showMsg('Write something first');
return;

}

localStorage.setItem(
diaryKey(),
btoa(unescape(encodeURIComponent(txt)))
);

showMsg('Diary Saved ✅');

showList();

updateCounter();

}

function loadDiary(){

let data=localStorage.getItem(diaryKey());

try{

editor.innerHTML=
data
?decodeURIComponent(escape(atob(data)))
:'';

}catch{

editor.innerHTML='';

}

updateCounter();

renderPhotos();

}

function updateCounter(){

document.getElementById('counter').innerText=
editor.innerText.length+' Characters';

}

editor.addEventListener('input',updateCounter);

function showMsg(text){

document.getElementById('msg').innerText=text;

setTimeout(()=>{
document.getElementById('msg').innerText='';
},2000);

}

function showList(){

let list=document.getElementById('diaryList');

list.innerHTML='';

Object.keys(localStorage)
.filter(key=>key.startsWith('diary_'+localStorage.getItem('user')))
.reverse()
.forEach(key=>{

let date=key.split('_')[2];

list.innerHTML+=`
<div class="item" style="display:flex;justify-content:space-between;align-items:center;gap:10px;">

<div onclick="openDiary('${date}')" 
style="cursor:pointer;font-weight:600;flex:1;">
📚 ${date}
</div>

<button 
onclick="deleteDiary('${key}')"
style="
width:auto;
padding:8px 14px;
border:none;
border-radius:10px;
background:#ef4444;
color:white;
font-size:13px;
cursor:pointer;
">
🗑 Delete
</button>

</div>
`;

});

}

function openDiary(date){

openPage('home');

document.getElementById('date').value=date;

loadDiary();

}

function searchDiary(text){

let list=document.getElementById('diaryList');

list.innerHTML='';

Object.keys(localStorage).forEach(key=>{

if(key.startsWith('diary_'+localStorage.getItem('user'))){

let data=
decodeURIComponent(
escape(atob(localStorage.getItem(key)))
);

if(
data.replace(/<[^>]*>/g,'')
.toLowerCase()
.includes(text.toLowerCase())
){

let date=key.split('_')[2];

list.innerHTML+=`
<div class="item" onclick="openDiary('${date}')">
📅 ${date}
</div>
`;

}

}

});

}

function addFavorite(){

let key='fav_'+diaryKey();

if(localStorage.getItem(key)){

showMsg('Already Favorite ⭐');
return;

}

localStorage.setItem(key,editor.innerHTML);

showMsg('Added To Favorites ⭐');

loadFavorites();

}

function loadFavorites(){

let list=document.getElementById('favoriteList');

list.innerHTML='';

Object.keys(localStorage).forEach(key=>{

if(key.startsWith('fav_diary_'+localStorage.getItem('user'))){

list.innerHTML+=`
<div class="item">
⭐ ${key.replace('fav_diary_','')}
</div>
`;

}

});

}

function loadDashboard(){

let diaries=
Object.keys(localStorage)
.filter(key=>key.startsWith('diary_'+localStorage.getItem('user')));

document.getElementById('totalDiary').innerText=diaries.length;

document.getElementById('favoriteCount').innerText=
Object.keys(localStorage)
.filter(key=>key.startsWith('fav_diary_'+localStorage.getItem('user')))
.length;

let chars=0;

diaries.forEach(key=>{
chars+=decodeURIComponent(escape(atob(localStorage.getItem(key)))).length;
});

document.getElementById('wordCount').innerText=chars;

renderCalendar();

}

function saveProfile(){

let newName=document.getElementById('editName').value;

let newPass=document.getElementById('editPass').value;

if(newName!==''){

localStorage.setItem('user',newName);

document.getElementById('topUserText').innerText=newName;

}

if(newPass.length>=8){

localStorage.setItem('password',btoa(newPass));

}

alert('Profile Updated ✅');

}

function uploadProfilePhoto(event){

let file=event.target.files[0];

if(!file) return;

let reader=new FileReader();

reader.onload=function(){

localStorage.setItem('profilePhoto',reader.result);

document.getElementById('profilePreview').src=reader.result;

document.getElementById('topProfileImg').src=reader.result;

};

reader.readAsDataURL(file);

}

window.onload=function(){

    let savedTheme=localStorage.getItem('theme');

if(savedTheme==='light'){

document.body.classList.add('lightTheme');

}

let savedPhoto=localStorage.getItem('profilePhoto');

if(savedPhoto){

document.getElementById('profilePreview').src=savedPhoto;

document.getElementById('topProfileImg').src=savedPhoto;

}

if(localStorage.getItem('user')){

document.getElementById('topUserText').innerText=
localStorage.getItem('user');

}

loadDiary();

}

function addMood(mood){

editor.innerHTML+='<br>'+mood+'<br>';

updateCounter();

}

function startVoice(){

if(!('webkitSpeechRecognition' in window)){

alert('Voice Recognition Not Supported');

return;

}

let recognition=new webkitSpeechRecognition();

recognition.lang='en-US';

recognition.start();

recognition.onresult=function(event){

editor.innerHTML+=' '+event.results[0][0].transcript;

updateCounter();

openPage('home');

};

}

function uploadPhoto(event){

let file=event.target.files[0];

if(!file) return;

let reader=new FileReader();

reader.onload=function(){

let img=document.getElementById('photoPreview');

img.src=reader.result;

img.style.display='block';

};

reader.readAsDataURL(file);

}

function toggleTheme(){

document.body.classList.toggle('lightTheme');

if(document.body.classList.contains('lightTheme')){

localStorage.setItem('theme','light');

}else{

localStorage.setItem('theme','dark');

}

}

function logout(){

localStorage.removeItem('user');

localStorage.removeItem('password');

location.reload();

}

setInterval(()=>{

let txt=editor.innerHTML.trim();

if(txt!=='' && txt!=='<br>'){

localStorage.setItem(
diaryKey(),
btoa(unescape(encodeURIComponent(txt)))
);

}

},4000);

function photoKey(){

return 'photos_'+diaryKey();

}

function addPhotos(event){

let files=event.target.files;

let arr=JSON.parse(localStorage.getItem(photoKey()) || "[]");

Array.from(files).forEach(file=>{
    if(file.size > 2000000){

alert("Image too large");
return;

}

let reader=new FileReader();

reader.onload=function(){

arr.push(reader.result);

localStorage.setItem(photoKey(),JSON.stringify(arr));

renderPhotos();

};

reader.readAsDataURL(file);

});

}

function renderPhotos(){

let box=document.getElementById("photoGallery");

let arr=JSON.parse(localStorage.getItem(photoKey()) || "[]");

box.innerHTML='';

arr.forEach((img,index)=>{

box.innerHTML+=`
<div style="position:relative;width:90px;height:90px;">

<img 
src="${img}"
style="
width:90px;
height:90px;
object-fit:cover;
border-radius:14px;
border:2px solid rgba(255,255,255,0.15);
">

<button 
onclick="deletePhoto(${index})"
style="
position:absolute;
top:-8px;
right:-8px;
width:24px;
height:24px;
border:none;
border-radius:50%;
background:#ef4444;
color:white;
font-size:14px;
font-weight:bold;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
">
✕
</button>

</div>
`;

});

}

function deletePhoto(index){

let arr=JSON.parse(localStorage.getItem(photoKey()) || "[]");

arr.splice(index,1);

localStorage.setItem(photoKey(),JSON.stringify(arr));

renderPhotos();

showMsg("Photo Deleted 🗑");

}

function suggestDiary(){

let suggestions=[
"Today I learned something new about...",
"A moment that made me happy today was...",
"Something I want to improve tomorrow is...",
"One thing I am grateful for is...",
"My biggest achievement today was..."
];

document.getElementById("suggestBox").innerText=
suggestions[Math.floor(Math.random()*suggestions.length)];

}

function deleteDiary(key){

if(confirm("Delete this diary?")){

localStorage.setItem(
"trash_"+key,
localStorage.getItem(key)
);

localStorage.removeItem(key);

showMsg("Diary Deleted 🗑");

showList();

}

}

function restoreDiary(key){

localStorage.setItem(key,localStorage.getItem("trash_"+key));

localStorage.removeItem("trash_"+key);

showList();

loadTrash();

}

function loadTrash(){

let list=document.getElementById("trashList");

list.innerHTML='';

Object.keys(localStorage)
.filter(key=>key.startsWith("trash_diary_"))
.forEach(key=>{

let originalKey = key.replace("trash_","");

list.innerHTML+=`
<div class="item">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
">

<div style="font-weight:600;flex:1;">
🗑 ${originalKey}
</div>

<div style="display:flex;gap:8px;">

<button 
onclick="restoreDiary('${originalKey}')"
style="
width:auto;
padding:7px 14px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:12px;
cursor:pointer;
">
↩ Restore
</button>

<button 
onclick="permanentDelete('${key}')"
style="
width:auto;
padding:7px 14px;
border:none;
border-radius:10px;
background:#ef4444;
color:white;
font-size:12px;
cursor:pointer;
">
🗑 Delete
</button>

</div>

</div>

</div>
`;

});

}

function permanentDelete(key){

if(confirm("Delete permanently?")){

localStorage.removeItem(key);

loadTrash();

showMsg("Permanently Deleted ❌");

}

}

function pinDiary(){

let key="pin_"+diaryKey();

if(localStorage.getItem(key)){

showMsg("Already Pinned 📌");
return;

}

localStorage.setItem(key,"true");

showMsg("Diary Pinned 📌");

}

function toggleMusic(){

let music=document.getElementById("bgMusic");

if(music.paused){
music.play();
}else{
music.pause();
}

}

function renderCalendar(){

let box=document.getElementById("calendar");

let today=new Date();

let year=today.getFullYear();

let month=today.getMonth();

let days=new Date(year,month+1,0).getDate();

box.innerHTML='';

for(let i=1;i<=days;i++){

let d=`${year}-${String(month+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`;

box.innerHTML+=`
<button onclick="openDiary('${d}')">${i}</button>
`;

}

}

function format(cmd){

document.execCommand(cmd,false,null);

}

function exportData(){

let data=JSON.stringify(localStorage);

let blob=new Blob([data],{type:"application/json"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="my-diary-backup.json";

a.click();

}

function importData(event){

let file=event.target.files[0];

if(!file) return;

let reader=new FileReader();

reader.onload=function(){

try{

let data=JSON.parse(reader.result);

Object.keys(data).forEach(key=>{

localStorage.setItem(key,data[key]);

});

alert("Backup Restored ✅");

location.reload();

}catch{

alert("Invalid Backup File");

}

};

reader.readAsText(file);

}

function format(command){

editor.focus();

document.execCommand(command,false,null);

updateCounter();

}

function addLink(){

let url=prompt("Enter URL");

if(url){

document.execCommand('createLink',false,url);

}

}

function changeColor(){

editor.focus();

let color=prompt("Enter color name or hex code");

if(color){

document.execCommand('styleWithCSS', false, true);

document.execCommand('foreColor', false, color);

}

}

function clearEditor(){

if(confirm("Clear editor?")){

editor.innerHTML='';

updateCounter();

}

}
let currentFontSize = 3;

function increaseFontSize(){

if(currentFontSize < 7){

currentFontSize++;

editor.focus();

document.execCommand('fontSize', false, currentFontSize);

}

}

function decreaseFontSize(){

if(currentFontSize > 1){

currentFontSize--;

editor.focus();

document.execCommand('fontSize', false, currentFontSize);

}

}
</script>

</body>
</html>
